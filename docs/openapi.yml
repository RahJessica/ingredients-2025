openapi: 3.0.0
info:
  title: Ingredient API
  version: 1.0.0
  description: API de gestion d'ingredients

servers:
  - url: http://localhost:8000

components:
  schemas:
    Ingredient:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
          enum:
            - VEGETABLE
            - ANIMAL
            - MARINE
            - DAIRY
            - OTHER
        price:
          type: number
          format: double

    DishIngredient:
      type: object
      properties:
        ingredient:
          $ref: '#/components/schemas/Ingredient'
        quantity:
          type: number
        unit:
          type: string

    Dish:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        price:
          type: number
        dishType:
          type: string
        dishIngredients:
          type: array
          items:
            $ref: '#/components/schemas/DishIngredient'

  parameters:
    IngredientId:
      name: id
      in: path
      required: true # param path toujours OBLIGATOIRE
      schema:
        type: integer

paths:
  /ingredients:
    get:
      summary: Récupérer tous les ingrédients
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ingredient'

    post:
      summary: Créer un nouvel ingrédient
      description: Ajoute un ingrédient dans la base de données

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Ingredient'

      responses:
        '201':
          description: Ingrédient créé avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ingredient'

        '400':
          description: Requête invalide
          content:
            application/json:
              schema:
                type: string
              example: "Invalid request body"

  /ingredients/{id}:
    get:
      summary: Récupérer un ingrédient par id
      parameters:
        - $ref: '#/components/parameters/IngredientId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ingredient'

  /ingredients/{id}/stock:
    get:
      summary: Récupérer le stock d’un ingrédient à un instant donné
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID de l’ingrédient

        - name: at
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: Date au format ISO-8601

        - name: unit
          in: query
          required: true
          schema:
            type: string
            enum:
              - KG
              - L
              - PCS

      responses:
        '200':
          description: Stock récupéré avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  ingredientId:
                    type: integer
                  quantity:
                    type: number
                  unit:
                    type: string

        '400':
          description: Paramètre 'at' invalide
          content:
            application/json:
              schema:
                type: string
                example: "Invalid 'at' parameter. Use ISO-8601 format"

        '404':
          description: Ingrédient non trouvé
          content:
            application/json:
              schema:
                type: string
                example: "Ingredient.id=1 is not found"

  /dishes:
    get:
      summary: Récupérer la liste des plats
      description: Retourne tous les plats enregistrés en base

      responses:
        '200':
          description: Liste des plats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Dish'

  /dishes/{id}/ingredients:
    put:
      summary: Associer ou dissocier des ingrédients à un plat

      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer

      requestBody:
        required: true
        description: Liste des ingrédients à associer/dissocier
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Ingredient'

      responses:
        '200':
          description: Mise à jour réussie

        '400':
          description: Corps de requête manquant ou invalide
          content:
            application/json:
              schema:
                type: string
                example: "Request body is required"

        '404':
          description: Plat non trouvé
          content:
            application/json:
              schema:
                type: string
                example: "Dish.id=1 is not found"